# cargo-mutants config for protocol-critical arithmetic and settlement code.
# See docs/mutation-testing.md for survivor triage and local commands.
examine_globs = [
  "src/profits.rs",
  "src/fees.rs",
  "src/settlement.rs",
  "src/escrow.rs",
]

# Keep CI runtimes bounded while the job is advisory. Developers can override
# this with command-line flags for deeper local analysis.
timeout_multiplier = 2.0
minimum_test_timeout = 60
