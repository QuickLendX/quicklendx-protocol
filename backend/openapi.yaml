openapi: 3.0.0
info:
  title: QuickLendX Protocol API
  description: |
    Backend API service for the QuickLendX invoice factoring protocol.

    ## Pagination

    All list endpoints use **cursor-based pagination** for stable, efficient traversal.

    ### Request parameters

    | Parameter | Type    | Default | Max | Description                                      |
    |-----------|---------|---------|-----|--------------------------------------------------|
    | `limit`   | integer | 20      | 100 | Number of items per page. Clamped to [1, 100].   |
    | `cursor`  | string  | —       | —   | Opaque cursor from a previous response's `next_cursor`. |

    ### Response shape

    Every list endpoint returns a `PageResult` object:

    ```json
    {
      "data": [ ... ],
      "next_cursor": "eyJpZCI6Ii4uLiIsInNvcnRfdmFsIjoxNzQ1NTk5fQ",
      "has_more": true
    }
    ```

    - `data` — the current page of items.
    - `next_cursor` — opaque string to pass as `cursor` on the next request; `null` when there are no more pages.
    - `has_more` — `true` when more items exist beyond this page.

    ### Sort order

    | Endpoint       | Primary sort key | Direction | Tiebreaker |
    |----------------|-----------------|-----------|------------|
    | `/invoices`    | `created_at`    | DESC      | `id` ASC   |
    | `/bids`        | `timestamp`     | DESC      | `bid_id` ASC |
    | `/settlements` | `timestamp`     | DESC      | `id` ASC   |
    | `/portfolio`   | `invested_at`   | DESC      | `id` ASC   |

    ### Security

    - Limit is always clamped server-side; clients cannot trigger unbounded scans.
    - Cursors are opaque base64url-encoded tokens; do not parse or construct them manually.
    - A malformed or tampered cursor returns `400 INVALID_PAGINATION`.
    - No `total` count is exposed to prevent data-inference attacks.

  version: 1.0.0
  contact:
    name: QuickLendX Team
    url: https://github.com/QuickLendX/quicklendx-protocol

servers:
  - url: http://localhost:3001/api/v1
    description: Local development server

paths:
  /health:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Health check
      description: Returns the status of the API service and connectivity.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                version: 1.0.0
                timestamp: '2026-01-01T00:00:00.000Z'

  /status:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Runtime status and rate limit policy snapshot
      description: Returns indexer lag status plus the active public rate-limit thresholds.
      responses:
        "200":
          description: Runtime status with live rate-limit policy values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              example:
                lag: 0
                warnThreshold: 10
                criticalThreshold: 50
                level: none
                isDegraded: false
                isCritical: false
                checkedAt: '2026-01-01T00:00:00.000Z'
                rateLimits:
                  global:
                    id: global
                    scope: all public API endpoints
                    limit: 100
                    windowSeconds: 60
                    blockSeconds: 60
                    key: client-ip
                    headers: [X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset]
                  perKey:
                    id: perKey
                    scope: all API endpoints after authentication context is available
                    limit: 60
                    windowSeconds: 60
                    blockSeconds: 60
                    key: api-key-or-client-ip
                    headers: [X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset]

  /admin/status:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Read internal admin status
      description: Returns troubleshooting details for authenticated admin roles.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Internal admin status
        "401":
          description: Missing bearer token
        "403":
          description: Invalid token or insufficient role

  /admin/audit-logs:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Read admin audit logs
      description: Returns recent authorization and admin action audit entries.
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Audit log entries

  /admin/maintenance:
    post:
      x-rate-limit:
        policies: [global, perKey]
      operationId: toggleMaintenanceMode
      summary: Toggle maintenance mode
      description: Restricted to operations admin and super-admin.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ enabled ]
              properties:
                enabled:
                  type: boolean
            examples:
              enable:
                description: Enable maintenance mode
                value:
                  enabled: true
              disable:
                description: Disable maintenance mode
                value:
                  enabled: false
      responses:
        "200":
          description: Maintenance mode updated

  /admin/backfill:
    post:
      x-rate-limit:
        policies: [global, perKey]
      operationId: queueBackfillJob
      summary: Queue a backfill job
      description: Restricted to operations admin and super-admin.
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: string
                  example: ledger:100000-100500
            examples:
              basic:
                description: Queue backfill for a ledger range
                value:
                  scope: "ledger:100000-100500"
      responses:
        "202":
          description: Backfill job queued

  /admin/config/dangerous:
    post:
      x-rate-limit:
        policies: [global, perKey]
      operationId: updateDangerousAdminConfig
      summary: Update dangerous admin configuration
      description: Restricted to super-admin only.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ allowEmergencyConfigChanges, maintenanceWindowMinutes ]
              properties:
                allowEmergencyConfigChanges:
                  type: boolean
                maintenanceWindowMinutes:
                  type: integer
                  minimum: 1
                  maximum: 1440
            examples:
              enable:
                description: Enable emergency config changes with 60 minute window
                value:
                  allowEmergencyConfigChanges: true
                  maintenanceWindowMinutes: 60
      responses:
        "200":
          description: Dangerous config updated

  /invoices:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: List invoices (paginated)
      description: |
        Returns a cursor-paginated list of invoices sorted by `created_at DESC, id ASC`.

        **Example — first page:**
        ```
        GET /invoices?limit=20
        ```

        **Example — next page:**
        ```
        GET /invoices?limit=20&cursor=<next_cursor from previous response>
        ```
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: business
          in: query
          schema:
            type: string
          description: Filter by business address
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InvoiceStatus"
      responses:
        "200":
          description: Paginated list of invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicePageResult"

  /invoices/{id}:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Get invoice by ID
      operationId: getInvoiceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef'
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  message: 'Invoice not found'
                  code: INVOICE_NOT_FOUND

  /bids:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: List ranked bids for an invoice (paginated)
      description: |
        Returns a cursor-paginated list of ranked bids for a given invoice, sorted by
        contract ranking semantics: (1) profit DESC, (2) expected_return DESC, (3) bid_amount DESC,
        (4) timestamp DESC, (5) bid_id ASC.
        
        Only returns Placed bids. Query parameter `invoice_id` is **required**.
      security:
        - {}  # Optional authentication
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: invoice_id
          in: query
          required: true
          schema:
            type: string
            format: hex
            example: "0x1234567890abcdef..."
          description: Invoice ID to filter bids
        - name: investor
          in: query
          schema:
            type: string
            format: stellar-address
            example: "GBSXVD727UNXJZ7ZM4VCXBTK3UMPXR7O6LLXS7XVOECGDYH3XFNV7C5K"
          description: Optional filter by investor address
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/BidStatus"
          description: Optional filter by bid status (default Placed only)
      responses:
        "200":
          description: Paginated ranked bids
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Bid"
                  next_cursor:
                    type: string
                    nullable: true
                  has_more:
                    type: boolean
        "400":
          $ref: '#/components/responses/PaginationError'
    post:
      x-rate-limit:
        policies: [global, perKey]
      operationId: createBid
      summary: Place a new bid on a Verified invoice
      description: |
        Creates a new bid for an investor on a Verified invoice.
        
        Requires authentication (Bearer token in Authorization header).
        
        **Validation rules:**
        - Invoice must be in Verified status
        - Investor cannot have an active bid on the same invoice (no duplicates)
        - bid_amount must be > 0
        - expected_return must be >= bid_amount
        - expiration_timestamp must be a positive integer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoice_id
                - bid_amount
                - expected_return
                - expiration_timestamp
              properties:
                invoice_id:
                  type: string
                  format: hex
                  example: "0x1234567890abcdef..."
                  description: Invoice ID to bid on
                bid_amount:
                  type: string
                  pattern: "^[0-9]+$"
                  example: "1000000"
                  description: Bid amount (as numeric string for JSON safety)
                expected_return:
                  type: string
                  pattern: "^[0-9]+$"
                  example: "1500000"
                  description: Expected return (must be >= bid_amount, as numeric string)
                expiration_timestamp:
                  type: integer
                  example: 1745599232
                  description: Unix timestamp when this bid expires
            examples:
              standard:
                description: Standard bid with expected return 1.5x bid amount
                value:
                  invoice_id: "0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
                  bid_amount: "1000000"
                  expected_return: "1500000"
                  expiration_timestamp: 1745599232
      responses:
        "201":
          description: Bid created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Bid"
        "400":
          description: Invalid bid parameters (non-Verified invoice, duplicate bid, validation failure)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      code:
                        type: string
                        enum:
                          - INVALID_BID
        "401":
          $ref: '#/components/responses/Unauthorized'

  /bids/{invoiceId}/best:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Get the best bid for an invoice
      description: |
        Returns the highest-ranked (best) bid for an invoice, or 404 if no Placed bids exist.
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: hex
          description: Invoice ID
      responses:
        "200":
          description: Best bid for the invoice
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Bid"
        "404":
          description: No bids found for this invoice

  /bids/{invoiceId}/ranked:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Get all ranked bids for an invoice
      description: |
        Returns all Placed bids for an invoice ranked by contract semantics.
        (best first: profit DESC, expected_return DESC, bid_amount DESC, timestamp DESC, bid_id ASC)
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: hex
          description: Invoice ID
      responses:
        "200":
          description: Ranked bids
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Bid"

  /settlements:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: List settlements (paginated)
      description: |
        Returns a cursor-paginated list of settlements sorted by `timestamp DESC, id ASC`.
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: invoice_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of settlements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Settlement"

  /settlements/{id}:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Get settlement by ID
      operationId: getSettlementById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: '0xsettle123'
      responses:
        "200":
          description: Settlement details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settlement"
        "404":
          description: Settlement not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  message: 'Settlement not found'
                  code: SETTLEMENT_NOT_FOUND

  /portfolio:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: List investor portfolio (paginated)
      description: |
        Returns a cursor-paginated list of portfolio entries for a given investor,
        sorted by `invested_at DESC, id ASC`.

        The `investor` query parameter is **required**.
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: investor
          in: query
          required: true
          schema:
            type: string
          description: Investor address (Stellar public key)
      responses:
        '200':
          description: Paginated portfolio entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioPageResult'
        '400':
          $ref: '#/components/responses/PaginationError'

  /invoices/{id}/disputes:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: List disputes for an invoice
      operationId: listDisputesByInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef'
      responses:
        "200":
          description: Paginated list of disputes for an invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputePageResult"

  /notifications/preferences/{userId}:
    get:
      x-rate-limit:
        policies: [global, perKey]
      summary: Get user notification preferences
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: User notification preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotificationPreferences'
        '404':
          description: User preferences not found
    put:
      x-rate-limit:
        policies: [global, perKey]
      operationId: updateNotificationPreferences
      summary: Update user notification preferences
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationPreferences'
            examples:
              enableAll:
                description: Enable all notification types
                value:
                  email_enabled: true
                  email_address: "user@example.com"
                  notifications:
                    invoice_funded: true
                    payment_received: true
                    dispute_opened: true
                    dispute_resolved: true
      responses:
        '200':
          description: Preferences updated successfully
        '400':
          description: Invalid request data

  /notifications/unsubscribe/{userId}:
    post:
      x-rate-limit:
        policies: [global, perKey]
      summary: Unsubscribe user from email notifications
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User identifier
      responses:
        '200':
          description: Successfully unsubscribed

  /exports/generate:
    post:
      x-rate-limit:
        policies: [global, perKey, export]
      summary: Generate a signed data export link
      description: Returns a short-lived link to download all user-scoped data (invoices, bids, settlements) in CSV or JSON format.
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
          description: The desired export format.
      responses:
        "200":
          description: Export link generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  download_url:
                    type: string
                    example: "/api/v1/exports/download/SIGNED_TOKEN"
                  expires_in:
                    type: string
                    example: "1 hour"
        "401":
          description: Authentication required

  /exports/download/{token}:
    get:
      x-rate-limit:
        policies: [global, perKey, export]
      summary: Download exported data
      description: Serves the export file using a signed token.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Signed token representing the export request.
      responses:
        "200":
          description: Export file content
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
        "401":
          description: Invalid or expired token

  /events:
    post:
      x-rate-limit:
        policies: [global, perKey]
      operationId: processBlockchainEvents
      summary: Process blockchain events for notifications
      description: Internal endpoint for indexer to post events that trigger notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/Event'
                - type: array
                  items:
                    $ref: '#/components/schemas/Event'
            examples:
              singleEvent:
                description: Single blockchain event
                value:
                  type: "InvoiceCreated"
                  data:
                    invoice_id: "0x123abc"
                    amount: "1000000"
              multipleEvents:
                description: Array of blockchain events
                value:
                  - type: "InvoiceCreated"
                    data:
                      invoice_id: "0x123abc"
                      amount: "1000000"
                  - type: "BidPlaced"
                    data:
                      bid_id: "0xbid123"
                      invoice_id: "0x123abc"
      responses:
        '200':
          description: Events processed successfully
        '500':
          description: Internal server error

  /keys/{id}/rotate-signing-secret:
    post:
      x-rate-limit:
        policies: [global, perKey]
      summary: Rotate an API key's signing secret
      description: |
        Generates a new signing secret for the specified API key ID, retaining the old secret for a configurable grace window (default 24h). Requires admin RBAC privileges.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the API key to rotate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - actor
              properties:
                actor:
                  type: string
                  description: Identifier of the admin performing the rotation
                grace_window_hours:
                  type: integer
                  default: 24
                  description: Hours to retain the old secret
      responses:
        "200":
          description: Successfully rotated the signing secret
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      key:
                        type: string
                        description: The new plaintext key. Only returned once.
                      prefix:
                        type: string
                      scopes:
                        type: array
                        items:
                          type: string
                      created_at:
                        type: string
                        format: date-time
                      prev_secret_expires_at:
                        type: string
                        format: date-time
                      warning:
                        type: string
        "400":
          description: Validation error or failure to rotate
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Insufficient admin role permissions

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token

  schemas:
    RateLimitPolicy:
      type: object
      description: Public rate-limit policy metadata. Runtime bucket state is intentionally not exposed.
      required:
        - id
        - scope
        - limit
        - windowSeconds
        - blockSeconds
        - key
        - headers
      properties:
        id:
          type: string
          enum: [global, perKey, strict, reconciliation, export]
        scope:
          type: string
        limit:
          type: integer
          minimum: 1
        windowSeconds:
          type: integer
          minimum: 1
        blockSeconds:
          type: integer
          minimum: 0
        key:
          type: string
          enum: [client-ip, api-key-or-client-ip]
        headers:
          type: array
          items:
            type: string

    RateLimitPolicies:
      type: object
      required:
        - global
        - perKey
        - strict
        - reconciliation
        - export
      properties:
        global:
          $ref: '#/components/schemas/RateLimitPolicy'
        perKey:
          $ref: '#/components/schemas/RateLimitPolicy'
        strict:
          $ref: '#/components/schemas/RateLimitPolicy'
        reconciliation:
          $ref: '#/components/schemas/RateLimitPolicy'
        export:
          $ref: '#/components/schemas/RateLimitPolicy'

    StatusResponse:
      type: object
      required:
        - lag
        - warnThreshold
        - criticalThreshold
        - level
        - isDegraded
        - isCritical
        - checkedAt
        - rateLimits
      properties:
        lag:
          type: integer
        warnThreshold:
          type: integer
        criticalThreshold:
          type: integer
        level:
          type: string
          enum: [none, warn, critical]
        isDegraded:
          type: boolean
        isCritical:
          type: boolean
        checkedAt:
          type: string
          format: date-time
        rateLimits:
          $ref: '#/components/schemas/RateLimitPolicies'

    FreshnessMetadata:
      type: object
      description: >
        Data freshness metadata. Clients SHOULD warn users when indexLagSeconds > 30
        and SHOULD block irreversible financial actions when indexLagSeconds > 120.
        Only public ledger data is exposed — no node addresses or network topology.
      required:
        - lastIndexedLedger
        - indexLagSeconds
        - lastUpdatedAt
        - cursor
      properties:
        lastIndexedLedger:
          type: integer
          format: int64
          description: Last ledger sequence number processed by the indexer.
          example: 1042857
        indexLagSeconds:
          type: number
          format: double
          description: >
            Seconds the indexer is behind the chain tip.
            0 when the indexer is current. Computed as lagLedgers × 5 (Stellar ~5 s/ledger).
          example: 10
        lastUpdatedAt:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp of the indexed ledger close time.
          example: "2024-03-15T10:22:41Z"
        cursor:
          type: string
          description: >
            Opaque pagination/replay cursor. Do not parse — treat as a black box.
            Format is an implementation detail and may change.
          example: "1042857_0"

    FreshnessEnvelope:
      type: object
      description: Generic response wrapper pairing a data payload with freshness metadata.
      required:
        - data
        - freshness
      properties:
        freshness:
          $ref: '#/components/schemas/FreshnessMetadata'

    InvoiceStatus:
      type: string
      enum: [ Pending, Verified, Funded, Paid, Defaulted, Cancelled ]

    InvoiceCategory:
      type: string
      enum:
        [
          Services,
          Products,
          Consulting,
          Manufacturing,
          Technology,
          Healthcare,
          Other,
        ]

    LineItem:
      type: object
      required:
        - description
        - quantity
        - unit_price
        - total
      properties:
        description: { type: string }
        quantity: { type: string, description: "i128 as string" }
        unit_price: { type: string, description: "i128 as string" }
        total: { type: string, description: "i128 as string" }

    InvoiceMetadata:
      type: object
      required:
        - customer_name
        - customer_address
        - tax_id
        - line_items
        - notes
      properties:
        customer_name:
          type: string
        customer_address:
          type: string
        tax_id:
          type: string
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
        notes: { type: string }

    Invoice:
      type: object
      required:
        - id
        - business
        - amount
        - currency
        - due_date
        - status
        - description
        - category
        - tags
        - metadata
        - created_at
        - updated_at
      properties:
        id: { type: string }
        business: { type: string }
        amount: { type: string, description: "i128 as string" }
        currency: { type: string }
        due_date: { type: integer, format: int64 }
        status: { $ref: "#/components/schemas/InvoiceStatus" }
        description: { type: string }
        category: { $ref: "#/components/schemas/InvoiceCategory" }
        tags:
          type: array
          items: { type: string }
        metadata: { $ref: "#/components/schemas/InvoiceMetadata" }
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }

    BidStatus:
      type: string
      enum: [ Placed, Withdrawn, Accepted, Expired, Cancelled ]

    Bid:
      type: object
      required:
        - bid_id
        - invoice_id
        - investor
        - bid_amount
        - expected_return
        - timestamp
        - status
        - expiration_timestamp
      properties:
        bid_id: { type: string }
        invoice_id: { type: string }
        investor: { type: string }
        bid_amount: { type: string, description: "i128 as string" }
        expected_return: { type: string, description: "i128 as string" }
        timestamp: { type: integer, format: int64 }
        status: { $ref: "#/components/schemas/BidStatus" }
        expiration_timestamp: { type: integer, format: int64 }

    SettlementStatus:
      type: string
      enum: [ Pending, Paid, Defaulted ]

    Settlement:
      type: object
      required:
        - id
        - invoice_id
        - amount
        - payer
        - recipient
        - timestamp
        - status
      properties:
        id: { type: string }
        invoice_id: { type: string }
        amount: { type: string, description: "i128 as string" }
        payer: { type: string }
        recipient: { type: string }
        timestamp: { type: integer, format: int64 }
        status: { $ref: "#/components/schemas/SettlementStatus" }

    InvestmentStatus:
      type: string
      enum: [Active, Completed, Defaulted, Refunded]

    PortfolioEntry:
      type: object
      properties:
        id: { type: string }
        investor: { type: string }
        invoice_id: { type: string }
        invested_amount: { type: string, description: "i128 as string" }
        expected_return: { type: string, description: "i128 as string" }
        status: { $ref: '#/components/schemas/InvestmentStatus' }
        invested_at: { type: integer, format: int64 }

    DisputeStatus:
      type: string
      enum: [ None, Disputed, UnderReview, Resolved ]

    Dispute:
      type: object
      required:
        - id
        - invoice_id
        - initiator
        - reason
        - status
        - created_at
      properties:
        id: { type: string }
        invoice_id: { type: string }
        initiator: { type: string }
        reason: { type: string }
        status: { $ref: "#/components/schemas/DisputeStatus" }
        created_at: { type: integer, format: int64 }
        resolved_at: { type: integer, format: int64 }

    PortfolioPageResult:
      type: object
      description: Paginated result wrapper for portfolio entries.
      required:
        - data
        - next_cursor
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioEntry'
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null when no more pages exist.
        has_more:
          type: boolean
          description: true when more items exist beyond this page.

    InvoicePageResult:
      type: object
      description: Paginated result wrapper for invoices.
      required:
        - data
        - next_cursor
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null when no more pages exist.
        has_more:
          type: boolean
          description: true when more items exist beyond this page.

    BidPageResult:
      type: object
      description: Paginated result wrapper for bids.
      required:
        - data
        - next_cursor
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Bid'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    DisputePageResult:
      type: object
      description: Paginated result wrapper for disputes.
      required:
        - data
        - next_cursor
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Dispute'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    ErrorEnvelope:
      type: object
      description: Standard error response envelope used across all controllers.
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
              description: Human-readable error description.
            code:
              type: string
              description: Machine-readable error code (SCREAMING_SNAKE_CASE).
            details:
              description: Optional extra details (omitted in production).

    NotificationType:
      type: string
      enum:
        - invoice_funded
        - payment_received
        - dispute_opened
        - dispute_resolved

    UserNotificationPreferences:
      type: object
      properties:
        userId:
          type: string
        email_enabled:
          type: boolean
        email_address:
          type: string
          format: email
        notifications:
          type: object
          additionalProperties:
            type: boolean

    UpdateNotificationPreferences:
      type: object
      properties:
        email_enabled:
          type: boolean
        email_address:
          type: string
          format: email
        notifications:
          type: object
          additionalProperties:
            type: boolean

    Event:
      type: object
      description: A blockchain event to be processed for notifications.
      required:
        - type
      properties:
        type:
          type: string
          description: Event type identifier (e.g. InvoiceCreated, BidPlaced).
        data:
          type: object
          description: Event payload; shape varies by type.

  parameters:
    LimitParam:
      name: limit
      in: query
      description: Number of items per page. Clamped to [1, 100].
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    CursorParam:
      name: cursor
      in: query
      description: Opaque cursor from a previous response's next_cursor field.
      schema:
        type: string

  responses:
    PaginationError:
      description: Invalid pagination parameters (bad limit or malformed cursor).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
