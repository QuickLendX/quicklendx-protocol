openapi: 3.0.0
info:
  title: QuickLendX Protocol API
  description: Backend API service for the QuickLendX invoice factoring protocol.
  version: 1.0.0
  contact:
    name: QuickLendX Team
    url: https://github.com/QuickLendX/quicklendx-protocol

servers:
  - url: http://localhost:3001/api/v1
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      description: Returns the status of the API service and connectivity.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  timestamp:
                    type: string
                    format: date-time

  /invoices:
    get:
      summary: List invoices
      description: Retrieve a list of invoices with optional filtering.
      parameters:
        - name: business
          in: query
          schema:
            type: string
          description: Filter by business address
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InvoiceStatus'
      responses:
        '200':
          description: List of invoices with freshness metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FreshnessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Invoice'

  /invoices/{id}:
    get:
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice details with freshness metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FreshnessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Invoice'
        '404':
          description: Invoice not found

  /bids:
    get:
      summary: List bids
      parameters:
        - name: invoice_id
          in: query
          schema:
            type: string
        - name: investor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of bids with freshness metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FreshnessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Bid'

  /settlements:
    get:
      summary: List settlements
      parameters:
        - name: invoice_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of settlements with freshness metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FreshnessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Settlement'

  /settlements/{id}:
    get:
      summary: Get settlement by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Settlement details with freshness metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FreshnessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Settlement'
        '404':
          description: Settlement not found

  /invoices/{id}/disputes:
    get:
      summary: List disputes for an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of disputes with freshness metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/FreshnessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Dispute'

components:
  schemas:
    FreshnessMetadata:
      type: object
      description: >
        Data freshness metadata. Clients SHOULD warn users when indexLagSeconds > 30
        and SHOULD block irreversible financial actions when indexLagSeconds > 120.
        Only public ledger data is exposed — no node addresses or network topology.
      required:
        - lastIndexedLedger
        - indexLagSeconds
        - lastUpdatedAt
        - cursor
      properties:
        lastIndexedLedger:
          type: integer
          format: int64
          description: Last ledger sequence number processed by the indexer.
          example: 1042857
        indexLagSeconds:
          type: number
          format: double
          description: >
            Seconds the indexer is behind the chain tip.
            0 when the indexer is current. Computed as lagLedgers × 5 (Stellar ~5 s/ledger).
          example: 10
        lastUpdatedAt:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp of the indexed ledger close time.
          example: "2024-03-15T10:22:41Z"
        cursor:
          type: string
          description: >
            Opaque pagination/replay cursor. Do not parse — treat as a black box.
            Format is an implementation detail and may change.
          example: "1042857_0"

    FreshnessEnvelope:
      type: object
      description: Generic response wrapper pairing a data payload with freshness metadata.
      required:
        - data
        - freshness
      properties:
        freshness:
          $ref: '#/components/schemas/FreshnessMetadata'

    InvoiceStatus:
      type: string
      enum: [Pending, Verified, Funded, Paid, Defaulted, Cancelled]

    InvoiceCategory:
      type: string
      enum: [Services, Products, Consulting, Manufacturing, Technology, Healthcare, Other]

    LineItem:
      type: object
      properties:
        description: { type: string }
        quantity: { type: integer, format: int128 }
        unit_price: { type: integer, format: int128 }
        total: { type: integer, format: int128 }

    InvoiceMetadata:
      type: object
      properties:
        customer_name: { type: string }
        customer_address: { type: string }
        tax_id: { type: string }
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        notes: { type: string }

    Invoice:
      type: object
      properties:
        id: { type: string }
        business: { type: string }
        amount: { type: integer, format: int128 }
        currency: { type: string }
        due_date: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/InvoiceStatus' }
        description: { type: string }
        category: { $ref: '#/components/schemas/InvoiceCategory' }
        tags:
          type: array
          items: { type: string }
        metadata: { $ref: '#/components/schemas/InvoiceMetadata' }
        created_at: { type: integer, format: int64 }
        updated_at: { type: integer, format: int64 }

    BidStatus:
      type: string
      enum: [Placed, Withdrawn, Accepted, Expired, Cancelled]

    Bid:
      type: object
      properties:
        bid_id: { type: string }
        invoice_id: { type: string }
        investor: { type: string }
        bid_amount: { type: integer, format: int128 }
        expected_return: { type: integer, format: int128 }
        timestamp: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/BidStatus' }
        expiration_timestamp: { type: integer, format: int64 }

    SettlementStatus:
      type: string
      enum: [Pending, Paid, Defaulted]

    Settlement:
      type: object
      properties:
        id: { type: string }
        invoice_id: { type: string }
        amount: { type: integer, format: int128 }
        payer: { type: string }
        recipient: { type: string }
        timestamp: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/SettlementStatus' }

    DisputeStatus:
      type: string
      enum: [None, Disputed, UnderReview, Resolved]

    Dispute:
      type: object
      properties:
        id: { type: string }
        invoice_id: { type: string }
        initiator: { type: string }
        reason: { type: string }
        status: { $ref: '#/components/schemas/DisputeStatus' }
        created_at: { type: integer, format: int64 }
        resolved_at: { type: integer, format: int64 }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
