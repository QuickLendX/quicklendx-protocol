name: Soroban Smart Contracts CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect contract-impacting changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - 'quicklendx-contracts/**'

      - name: Skip contract build for docs-only PRs
        if: github.event_name == 'pull_request' && steps.changes.outputs.contracts != 'true'
        run: echo "Docs-only PR detected; skipping Soroban contract build steps."

      - name: Install Rust
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
      - name: Install Rust target for Soroban
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          source $HOME/.cargo/env
          rustup target add wasm32v1-none
      - name: Detect optional Stellar CLI
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          if command -v stellar >/dev/null 2>&1; then
            stellar --version
          else
            echo "stellar CLI not found; WASM build step will fall back to cargo."
          fi

      - name: Build Cargo project
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          cd quicklendx-contracts
          cargo build --verbose

      - name: Check code quality
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          source $HOME/.cargo/env
          cd quicklendx-contracts
          cargo check --lib --verbose

      - name: Install wasm-opt (binaryen) for size reduction
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y binaryen
          elif command -v brew >/dev/null 2>&1; then
            brew install binaryen
          else
            echo "No supported package manager found for binaryen install."
            exit 1
          fi
          wasm-opt --version

      - name: Build and check WASM size budget (shell script)
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          source $HOME/.cargo/env
          quicklendx-contracts/scripts/check-wasm-size.sh

      - name: Run WASM size budget regression tests
        # Runs tests/wasm_build_size_budget.rs – a self-contained integration test
        # that does NOT import contract types, so it compiles independently of the
        # legacy test suite.  It enforces:
        #   • hard budget  (256 KiB)
        #   • warning zone (90 % of budget)
        #   • regression limit (baseline + 5 % margin)
        # plus ~30 fast unit tests for constants, classify_size, and helpers.
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          source $HOME/.cargo/env
          cd quicklendx-contracts
          cargo test --test wasm_build_size_budget --verbose

      - name: Run Cargo tests
        run: |
          source $HOME/.cargo/env
          cargo test --verbose

      - name: Run escrow invariant model
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          source $HOME/.cargo/env
          cd quicklendx-contracts
          CI=1 cargo test test_escrow_invariant_model -- --nocapture

      - name: Install cargo-mutants
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        run: |
          source $HOME/.cargo/env
          cargo install cargo-mutants

      - name: Run cargo-mutants advisory scan
        if: github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true'
        continue-on-error: true
        run: |
          source $HOME/.cargo/env
          cd quicklendx-contracts
          cargo mutants --in-place=false --json > mutants.json

      - name: Upload cargo-mutants JSON artifact
        if: always() && (github.event_name != 'pull_request' || steps.changes.outputs.contracts == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: cargo-mutants-survivors
          path: quicklendx-contracts/mutants.json
          if-no-files-found: warn
          retention-days: 14

      - name: Test coverage (baseline + admin gate)
        run: |
          source $HOME/.cargo/env
          cargo install cargo-llvm-cov
          # TODO: restore the original 95% gate after the legacy test suite is repaired.
          cargo llvm-cov --lib --fail-under-lines 50
          cd quicklendx-contracts
          cargo llvm-cov clean --workspace
          cargo llvm-cov --lib --lcov --output-path coverage/lcov.info
          bash scripts/check-admin-coverage.sh coverage/lcov.info

      - name: Generate Coverage Drift Report
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source $HOME/.cargo/env
          PR_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          # 1. Generate PR coverage JSON
          cd quicklendx-contracts
          cargo llvm-cov --lib --json > ../pr_coverage.json
          
          # 2. Generate Baseline (Main) coverage JSON
          # We stash local changes to ensure a clean checkout of main files
          git stash push -m "coverage-drift-stash"
          git fetch origin main
          
          # Only checkout necessary files for coverage calculation
          git checkout origin/main -- Cargo.toml Cargo.lock src/ tests/ 2>/dev/null || true
          cargo llvm-cov clean --workspace
          # If main coverage fails, we produce an empty JSON so the script can still run
          cargo llvm-cov --lib --json > ../main_coverage.json || echo '{"data":[{"files":[]}]}' > ../main_coverage.json
          
          # 3. Restore PR state
          git checkout $PR_BRANCH -- Cargo.toml Cargo.lock src/ tests/ 2>/dev/null || true
          git stash pop || true
          
          # 4. Run drift script and post comment
          cd ..
          PR_COMMENT_FILE=drift_report.md bash scripts/coverage-drift.sh main_coverage.json pr_coverage.json
          
          # Post or update comment to PR
          # We use a unique header to allow identifying the comment for future updates if needed
          gh pr comment ${{ github.event.pull_request.number }} --body-file drift_report.md
